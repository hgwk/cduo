name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo test-fast
        timeout-minutes: 5
      - run: cargo test-relay
        timeout-minutes: 5
      - run: cargo test-native
        timeout-minutes: 5
      - run: cargo clippy --all-targets -- -D warnings
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: release version guard
        run: |
          set -euo pipefail
          cargo_version=$(cargo metadata --no-deps --format-version 1 | node -e "let d=''; process.stdin.on('data', c => d += c); process.stdin.on('end', () => console.log(JSON.parse(d).packages.find(p => p.name === 'cduo').version));")
          npm_version=$(node -p "require('./npm/package.json').version")
          if [ "$cargo_version" != "$npm_version" ]; then
            echo "::error::Cargo.toml version $cargo_version does not match npm/package.json $npm_version"
            exit 1
          fi
          if [ "${GITHUB_ACTIONS:-}" = "true" ]; then
            if [ "${GITHUB_REF_TYPE:-}" != "tag" ]; then
              echo "::error::release workflow must run from a version tag"
              exit 1
            fi
            tag_version="${GITHUB_REF_NAME#v}"
            if [ "$tag_version" != "$npm_version" ]; then
              echo "::error::tag $GITHUB_REF_NAME does not match package version $npm_version"
              exit 1
            fi
          fi
      - run: node -c npm/install.js
      - run: node -c npm/bin/cduo
      - run: npm pack --dry-run
        working-directory: npm

  build:
    needs: quality
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - run: cargo build --release --target ${{ matrix.target }}
      - run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/cduo dist/cduo-${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: cduo-${{ matrix.target }}
          path: dist/cduo-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: |
          cd dist
          shasum -a 256 cduo-* > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: |
          cd npm && npm publish --access public
